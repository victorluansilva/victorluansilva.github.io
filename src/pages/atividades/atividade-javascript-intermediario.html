<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LISTA JAVASCRIPT</title>
    <link rel="stylesheet" href="../../../public/bootstrap/css_bootstrap.min.css">
</head>

<body>
    <div id="headerElement"></div>
    <div class="container-fluid">
        <!-- ATIVIDADE 1 -->
        <div class="row">
            <div class="col-4">
                <h4>Atividade nº 1</h4>
                <div class="col-2">
                    <label for="inputIdade"> Idade:</label>
                    <input type="text" id="inputIdade">
                </div>
                <button onclick="verificarIdade()">Verificar Idade</button>
                <p id="resultIdade"></p>
            </div>
        </div>
        <!-- ATIVIDADE 2 -->
        <div class="row">
            <div class="col-4">
                <h4>Atividade nº 2</h4>
                <div class="col-2">
                    <label for="valorA">Valor A:</label>
                    <input type="text" id="valorA">
                </div>
                <div class="col-2">
                    <label for="valorB">Valor B:</label>
                    <input type="text" id="valorB">
                </div>
                <button onclick="comparaValores()">Comparar Valores</button>
                <p id="resultCompValores"></p>
            </div>
        </div>
        <!-- ATIVIDADE 3 -->
        <div class="row">
            <div class="col-4">
                <h4>Atividade nº 3</h4>
                <div class="col-2">
                    <label for="primeiroValor">X:</label>
                    <input type="text" id="primeiroValor">
                </div>
                <div class="col-2">
                    <label for="segundoValor">Y:</label>
                    <input type="text" id="segundoValor">
                </div>
                <button onclick="ehDivisivel()">É divisível? </button>
                <p id="resultEhDivisivel"></p>
            </div>
        </div>
        <!-- ATIVIDADE 4 -->
        <div class="row">
            <div class="col-4">
                <h4>Atividade nº 4</h4>
                <label for="temperatura">Digite a temperatura atual</label>
                <input type="text" id="temperatura">
                <button onclick="temperatura()">Verificar</button>
                <p id="resultTemperatura"></p>
            </div>
        </div>
        <!-- ATIVIDADE 5 -->
        <div class="row">
            <div class="col-4">
                <h4>Atividade nº 5</h4>
                <div class="row-cols-4" id="materia1">
                    <div class="col">
                        <label for="nomeUsuario">Nome do aluno</label>
                        <input type="text" id="nomeUsuario">
                    </div>
                    <div class="col">
                        <label for="nomeInstituicao">Escola/Instituicao</label>
                        <input type="text" id="nomeInstituicao">
                    </div>
                    <div class="col-2 p-md-4">
                        <label for="nomeMateria">Matéria</label>
                        <input type="text" id="nomeMateria">
                    </div>
                    <div class="col-2 p-md-4 input-group">
                        <input type="number">
                        <input type="number">
                        <input type="number">
                        <input type="number">
                    </div>
                </div>
                <button onclick="save()">Verificar Notas</button>
                <p class="m-3 p-2" id="resultNotas"></p>
            </div>
        </div>
        <!-- ATIVIDADE 6 -->
        <div class="row">
            <div class="col-4">
                <h4>Atividade nº 6</h4>
                <label for="numberForFat">Fatorial de:</label>
                <input type="text" id="numberForFat">
                <button onclick="callFatorial()">Fatorar</button>

                <p id="resultFatorial"></p>
            </div>
        </div>
        <!-- ATIVIDADE 7 -->
        <div class="row">
            <div class="col-4">
                <h4>Atividade nº 7</h4>
                <label for="numRegressivo">Regressiva a partir de:</label>
                <input type="text" id="numRegressivo">
                <button onclick="callRegredir()">regredir</button>

                <p id="resultRegressao"></p>
            </div>
        </div>
        <!-- ATIVIDADE 8 -->
        <div class="row">
            <div class="col-4">
                <h4>Atividade nº 8</h4>
                <label for="numberTab">Tabuáda:</label>
                <input type="text" id="numberTab">
                <button onclick="tabuada()">TABUADA</button>

                <p id="resultTabuada"></p>
            </div>
        </div>
    </div>
    <div id="footerElement"></div>
    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./script-atividadejavascript.js"></script>
    <script src="../../../public/bootstrap/css_bootstrap.min.css"></script>
</body>

</html>
