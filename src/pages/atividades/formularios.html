<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Input Elements</title>
</head>
<body>
    <h1>Basic Input Elements</h1>
    
    <form action="#" method="POST">
        <!-- Text Input -->
        <label for="text-input">Text Input:</label>
        <input type="text" id="text-input" name="text-input" placeholder="Enter text">
        <br><br>

        <!-- Password Input -->
        <label for="password-input">Password Input:</label>
        <input type="password" id="password-input" name="password-input" placeholder="Enter password">
        <br><br>

        <!-- Email Input -->
        <label for="email-input">Email Input:</label>
        <input type="email" id="email-input" name="email-input" placeholder="example@example.com">
        <br><br>

        <!-- Number Input -->
        <label for="number-input">Number Input:</label>
        <input type="number" id="number-input" name="number-input" min="0" max="100" step="1">
        <br><br>

        <!-- Checkbox -->
        <label>Checkbox:</label>
        <input type="checkbox" id="checkbox1" name="checkbox1" value="option1">
        <label for="checkbox1">Option 1</label>
        <input type="checkbox" id="checkbox2" name="checkbox2" value="option2">
        <label for="checkbox2">Option 2</label>
        <br><br>

        <!-- Radio Buttons -->
        <label>Radio Buttons:</label>
        <input type="radio" id="radio1" name="radio" value="radio1">
        <label for="radio1">Radio 1</label>
        <input type="radio" id="radio2" name="radio" value="radio2">
        <label for="radio2">Radio 2</label>
        <br><br>

        <!-- Textarea -->
        <label for="textarea">Textarea:</label>
        <textarea id="textarea" name="textarea" rows="4" cols="50" placeholder="Enter text here"></textarea>
        <br><br>

        <!-- Select Dropdown -->
        <label for="select">Select Dropdown:</label>
        <select id="select" name="select">
            <option value="option1">Option 1</option>
            <option value="option2">Option 2</option>
            <option value="option3">Option 3</option>
        </select>
        <br><br>

        <!-- Submit Button -->
        <input type="submit" value="Submit">
    </form>
</body>
</html>
