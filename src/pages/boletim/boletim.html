<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boletim App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="./boletim.css">
</head>

<body>
    <!-- HEADER -->
    <script src="../structure-components/header/header.js"></script>

    <!-- CORPO DO BOLETIM -->
    <main class="content-vls container-fluid">
        <!-- ATIVIDADE 5 -->
        <div class="row grid gap-0 column-gap-3 inline-block">
            <!-- CARD DE INFORMAÇÃO DO ALUNO -->
            <div class="col-4 w-25">
                <div id="input_user" class="card p-3 border-secondary-subtle">
                    <div class="">
                        <!-- INPUT NOME -->
                        <div class="input-group mb-3">
                            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                            <div class="form-floating">
                                <input class="form-control" type="text" id="nomeUsuario" placeholder="Nome de usuário">
                                <label class="fw-medium" for="nomeUsuario">Seu nome</label>
                            </div>
                        </div>

                        <!-- INPUT INSTITUIÇÃO -->
                        <div class="input-group mb-3">
                            <span class="input-group-text"><i class="fa-solid fa-school-flag"></i></span>
                            <div class="form-floating">
                                <input class="form-control" type="text" id="nomeInstituicao" placeholder="Instituição">
                                <label class="fw-medium" for="nomeInstituicao">Instituição</label>
                            </div>
                        </div>

                        <!-- INPUT CURSO -->
                        <label class="fw-medium" for="tipoEnsino">Tipo de ensino</label>
                        <div id="tipoEnsino">
                            <div class="form-check" id="tipoEnsinoBase">
                                <input class="form-check-input" type="checkbox" id="ensino_base" value="">
                                <label class="form-check-label" for="ensino_base">
                                    Fundamental / Médio
                                </label>
                            </div>
                            <div class="form-check" id="tipoTecnicoSuperior">
                                <input class="form-check-input" type="checkbox" id="ensino_tecnico">
                                <label class="form-check-label" for="ensino_tecnico">
                                    Ténico / Superior
                                </label>
                            </div>
                        </div>
                        <div class="hidden" id="inputGroupCurso">
                            <div class="input-group mb-3">
                                <span class="input-group-text"><i class="fa-solid fa-book"></i></span>
                                <div class="form-floating">
                                    <input class="form-control" type="text" id="nomeCurso" placeholder="Curso">
                                    <label class="fw-medium" for="nomeCurso">Curso</label>
                                </div>
                            </div>
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-secondary" onclick="seguir()"> Seguir </button>
                        </div>
                    </div>
                </div>
                <div id="output_user" class="card text-bg-light mb-3" style="max-width: 18rem;">
                    <div id="userCardHeader" class="card-header"></div>
                    <div class="card-body">
                      <h5 id="userCardTitle" class="card-title"></h5>
                      <p  id="userCardId" class="card-text"></p>
                    </div>
                  </div>
            </div>
            <!-- CARD NOTAS E DEMAIS INFORMAÇÕES -->
            <div class="col-8">
                <div class="card p-3 border-secondary-subtle">
                    <div class="p-md-4">
                        <select id="dropMaterias" class="form-select"></select>
                    </div>
                    <div class="col-6 p-md-4 input-group">
                        <div class="row">
                            <div class="col-3 input-group mb-3">
                                <span class="input-group-text"><i class="fa-solid fa-1"></i></span>
                                <div class="form-floating">
                                    <input class="form-control" type="number" id="b1" placeholder="00">
                                    <label class="fw-normal" for="b1">bimestre</label>
                                </div>
                            </div>
                            <div class="col-3 input-group mb-3">
                                <span class="input-group-text"><i class="fa-solid fa-2"></i></span>
                                <div class="form-floating">
                                    <input class="form-control" type="number" id="b2" placeholder="00">
                                    <label class="fw-normal" for="b1">bimestre</label>
                                </div>
                            </div>
                            <div class="col-3 input-group mb-3">
                                <span class="input-group-text"><i class="fa-solid fa-3"></i></span>
                                <div class="form-floating">
                                    <input class="form-control" type="number" id="b3" placeholder="00">
                                    <label class="fw-normal" for="b1">bimestre</label>
                                </div>
                            </div>
                            <div class="col-3 input-group mb-3">
                                <span class="input-group-text"><i class="fa-solid fa-4"></i></span>
                                <div class="form-floating">
                                    <input class="form-control" type="number" id="b4" placeholder="00">
                                    <label class="fw-normal" for="b1">bimestre</label>
                                </div>
                            </div>

                        </div>
                    </div>

                    <button class="btn btn-secondary" onclick="save()">Verificar Notas</button>
                    <div class="m-3 p-2" id="resultNotas"></div>
                </div>
            </div>

        </div>

        <script src="./script-boletim.js"></script>
    </main>

    <!-- FOOTER -->
    <script src="../structure-components/footer/footer.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
</body>

</html>
